<svg xmlns="http://www.w3.org/2000/svg" width="980" height="300" viewBox="0 0 980 300" role="img" aria-labelledby="title desc">
  <title id="title">Pipeline de validacion de Loopscape</title>
  <desc id="desc">Diagrama de niveles de validacion para PR, benchmarks y release</desc>
  <rect width="980" height="300" rx="18" fill="#111827"/>
  <text x="40" y="42" fill="#f9fafb" font-family="Arial, sans-serif" font-size="24" font-weight="700">Validacion por niveles</text>
  <g font-family="Arial, sans-serif">
    <rect x="40" y="82" width="210" height="150" rx="16" fill="#1f2937" stroke="#60a5fa"/>
    <text x="65" y="115" fill="#ffffff" font-size="18" font-weight="700">PR normal</text>
    <text x="65" y="145" fill="#d1d5db" font-size="14">Formato</text>
    <text x="65" y="170" fill="#d1d5db" font-size="14">Metadata</text>
    <text x="65" y="195" fill="#d1d5db" font-size="14">Pruebas pequeñas</text>

    <rect x="290" y="82" width="210" height="150" rx="16" fill="#1f2937" stroke="#34d399"/>
    <text x="315" y="115" fill="#ffffff" font-size="18" font-weight="700">Investigacion</text>
    <text x="315" y="145" fill="#d1d5db" font-size="14">Escenarios</text>
    <text x="315" y="170" fill="#d1d5db" font-size="14">Benchmarks</text>
    <text x="315" y="195" fill="#d1d5db" font-size="14">Resultados</text>

    <rect x="540" y="82" width="210" height="150" rx="16" fill="#1f2937" stroke="#f59e0b"/>
    <text x="565" y="115" fill="#ffffff" font-size="18" font-weight="700">Release</text>
    <text x="565" y="145" fill="#d1d5db" font-size="14">Validacion completa</text>
    <text x="565" y="170" fill="#d1d5db" font-size="14">Clippy</text>
    <text x="565" y="195" fill="#d1d5db" font-size="14">Auditoria manual</text>

    <rect x="790" y="82" width="150" height="150" rx="16" fill="#1f2937" stroke="#fb7185"/>
    <text x="815" y="115" fill="#ffffff" font-size="18" font-weight="700">Web</text>
    <text x="815" y="145" fill="#d1d5db" font-size="14">Manual</text>
    <text x="815" y="170" fill="#d1d5db" font-size="14">Artifact</text>
    <text x="815" y="195" fill="#d1d5db" font-size="14">Sin Pages</text>
  </g>
  <text x="40" y="270" fill="#d1d5db" font-family="Arial, sans-serif" font-size="14">La validacion pesada queda fuera del PR normal para mantener el repositorio operable.</text>
</svg>
