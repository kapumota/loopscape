<svg xmlns="http://www.w3.org/2000/svg" width="980" height="260" viewBox="0 0 980 260" role="img" aria-labelledby="title desc">
  <title id="title">Flujo conceptual de Loopscape</title>
  <desc id="desc">Diagrama de flujo desde ReAct hasta orquestacion multiagente</desc>
  <rect width="980" height="260" rx="18" fill="#0f172a"/>
  <text x="40" y="42" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="24" font-weight="700">Loopscape como laboratorio de loops agenticos</text>
  <g font-family="Arial, sans-serif" font-size="15" font-weight="700">
    <rect x="40" y="84" width="150" height="90" rx="14" fill="#1e293b" stroke="#38bdf8"/>
    <text x="65" y="120" fill="#f8fafc">ReAct</text>
    <text x="65" y="145" fill="#cbd5e1" font-size="13" font-weight="400">Think Act Observe</text>

    <rect x="230" y="84" width="150" height="90" rx="14" fill="#1e293b" stroke="#a78bfa"/>
    <text x="255" y="120" fill="#f8fafc">DSL</text>
    <text x="255" y="145" fill="#cbd5e1" font-size="13" font-weight="400">Comandos formales</text>

    <rect x="420" y="84" width="150" height="90" rx="14" fill="#1e293b" stroke="#34d399"/>
    <text x="445" y="120" fill="#f8fafc">Supervisor</text>
    <text x="445" y="145" fill="#cbd5e1" font-size="13" font-weight="400">Latidos y control</text>

    <rect x="610" y="84" width="150" height="90" rx="14" fill="#1e293b" stroke="#f59e0b"/>
    <text x="635" y="120" fill="#f8fafc">Fallos</text>
    <text x="635" y="145" fill="#cbd5e1" font-size="13" font-weight="400">Recuperacion</text>

    <rect x="800" y="84" width="140" height="90" rx="14" fill="#1e293b" stroke="#fb7185"/>
    <text x="825" y="120" fill="#f8fafc">Evidencia</text>
    <text x="825" y="145" fill="#cbd5e1" font-size="13" font-weight="400">Replay y metricas</text>
  </g>
  <g stroke="#64748b" stroke-width="3" fill="none">
    <path d="M190 129 C205 129 215 129 230 129"/>
    <path d="M380 129 C395 129 405 129 420 129"/>
    <path d="M570 129 C585 129 595 129 610 129"/>
    <path d="M760 129 C775 129 785 129 800 129"/>
  </g>
  <text x="40" y="220" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="14">Escenarios comparables y benchmarks reproducibles permiten estudiar cambios entre corridas.</text>
</svg>
