name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always

jobs:
  auditoria-ligera:
    name: Auditoria ligera
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Verificar politica segura de workflows
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          from pathlib import Path

          patrones_bloqueados = [
              "pull_request" + "_target",
              "sec" + "rets" + ".",
              "contents:" + " write",
              "pages:" + " write",
              "id-token:" + " write",
          ]

          hubo_error = False

          for ruta in Path(".github/workflows").glob("*.yml"):
              texto = ruta.read_text(encoding="utf-8")
              for patron in patrones_bloqueados:
                  if patron in texto:
                      print(f"Politica rechazada en {ruta}: patron bloqueado")
                      hubo_error = True

          if hubo_error:
              raise SystemExit(1)

          print("Politica segura de workflows verificada")
          PY

      - name: Preparar Rust minimo
        shell: bash
        run: |
          set -euo pipefail
          rustup component add rustfmt

      - name: Verificar formato Rust
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all -- --check

      - name: Verificar manifiesto Cargo
        shell: bash
        run: |
          set -euo pipefail
          cargo metadata --locked --format-version 1 --no-deps > /dev/null
