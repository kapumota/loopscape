name: Validacion ligera

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: validacion-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust nativo
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev libudev-dev

      - name: Restaurar cache de Rust
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Verificar estilo documental
        run: make style-check

      - name: Verificar formato
        run: make fmt-check

      - name: Verificar compilacion nativa
        run: cargo check --locked --all-targets

      - name: Ejecutar pruebas nativas
        run: cargo test --locked --all-targets --no-fail-fast
