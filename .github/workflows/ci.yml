name: Validacion ligera

# Fuerza acciones JavaScript a usar Node.js 24 durante la transicion de GitHub Actions.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: validacion-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust nativo
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v5

      - name: Instalar Rust estable
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev libudev-dev

      - name: Restaurar cache de Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Verificar estilo documental
        run: make style-check

      - name: Verificar formato
        run: make fmt-check

      - name: Verificar compilacion nativa
        run: cargo check --locked --all-targets

      - name: Ejecutar pruebas nativas
        run: cargo test --locked --all-targets --no-fail-fast
