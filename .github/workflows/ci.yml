
name: Validacion ligera profesional

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: validacion-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auditoria:
    name: Auditoria de workflows
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Verificar politica segura de workflows
        shell: bash
        run: |
          set -euo pipefail

          patrones_bloqueados=(
            "pull_request""_target"
            "sec""rets""."
            "contents:"" write"
            "pages:"" write"
            "id-token:"" write"
          )

          for patron in "${patrones_bloqueados[@]}"; do
            if grep -R --line-number --fixed-strings "$patron" .github/workflows; then
              echo "Politica rechazada por patron bloqueado"
              exit 1
            fi
          done

          echo "Politica segura de workflows verificada"
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Instalar dependencias del sistema
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev libudev-dev

      - name: Restaurar cache de Rust
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Verificar estilo documental
        run: make style-check

      - name: Verificar formato
        run: make fmt-check

      - name: Verificar compilacion nativa
        run: cargo check --locked --all-targets

      - name: Ejecutar pruebas nativas
        run: cargo test --locked --all-targets --no-fail-fast
