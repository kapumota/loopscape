name: Artefacto web manual

on:
  workflow_dispatch:
    inputs:
      version_label:
        description: Etiqueta visible del artefacto
        required: false
        default: 0.9.0-dev
      public_url:
        description: Ruta publica usada por Trunk
        required: false
        default: ./

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always

concurrency:
  group: web-artifact-${{ github.ref }}
  cancel-in-progress: true

jobs:
  construir-artefacto-web:
    name: Construir artefacto web
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Preparar Rust y WebAssembly
        shell: bash
        run: |
          set -euo pipefail
          rustup target add wasm32-unknown-unknown
          cargo install trunk --locked

      - name: Construir dist
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          if make -n web-build >/dev/null 2>&1; then
            make web-build
          else
            trunk build --release --dist dist --public-url "${{ inputs.public_url }}"
          fi
          test -d dist
          find dist -maxdepth 2 -type f | sort

      - name: Subir artefacto web
        uses: actions/upload-artifact@v6
        with:
          name: loopscape-web-${{ inputs.version_label }}
          path: dist
          if-no-files-found: error
          retention-days: 14
