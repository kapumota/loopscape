name: Build web manual

# Fuerza acciones JavaScript a usar Node.js 24 durante la transicion de GitHub Actions.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wasm:
    name: WebAssembly manual
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v5

      - name: Instalar Rust estable para WebAssembly
        run: |
          rustup toolchain install stable --profile minimal --target wasm32-unknown-unknown
          rustup default stable

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev libudev-dev

      - name: Restaurar cache de Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Instalar Trunk
        run: cargo install trunk --locked

      - name: Construir WebAssembly
        run: make web-build-release

      - name: Guardar artefacto web
        uses: actions/upload-artifact@v6
        with:
          name: loopscape-web-dist
          path: dist/
          if-no-files-found: error
          retention-days: 7
