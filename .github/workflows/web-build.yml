
name: Build web manual

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: build-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wasm:
    name: WebAssembly manual
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Instalar dependencias del sistema
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev libudev-dev

      - name: Restaurar cache de Rust
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Instalar Trunk
        run: cargo install trunk --locked

      - name: Construir WebAssembly
        run: make web-build-release

      - name: Guardar artefacto web
        uses: actions/upload-artifact@v4
        with:
          name: loopscape-web-dist
          path: dist/
          if-no-files-found: error
          retention-days: 7
