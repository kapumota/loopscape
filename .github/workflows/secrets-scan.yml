name: Escaneo manual de secretos

on:
  workflow_dispatch:
    inputs:
      alcance:
        description: "Alcance del escaneo"
        required: true
        default: "historial"
        type: choice
        options:
          - historial
          - revision_actual
      motivo:
        description: "Motivo de ejecucion"
        required: true
        default: "revision_manual"
        type: choice
        options:
          - revision_manual
          - revision_release
  schedule:
    - cron: "23 7 * * 1"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: secretos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  escaneo-secretos:
    name: Escaneo de secretos
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Preparar Go minimo
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: false

      - name: Instalar gitleaks
        shell: bash
        run: |
          set -euo pipefail
          go install github.com/gitleaks/gitleaks/v8@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Ejecutar escaneo de secretos
        shell: bash
        run: |
          set -euo pipefail
          echo "Inicio de escaneo de secretos"
          echo "Evento: ${{ github.event_name }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Alcance solicitado: ${{ inputs.alcance }}"
            echo "Motivo solicitado: ${{ inputs.motivo }}"
          else
            echo "Alcance solicitado: historial"
            echo "Motivo solicitado: revision_semanal"
          fi

          gitleaks detect --source . --redact --verbose
