version: '3.8'

services:
  loopscape-proxy:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./proxy:/app
    command: sh -c "npm install && node local.js"
    ports:
      - "3001:3001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}

  loopscape-web:
    image: trunkrs/trunk:latest
    working_dir: /app
    volumes:
      - .:/app
    command: trunk serve --address 0.0.0.0
    ports:
      - "8080:8080"
    depends_on:
      - loopscape-proxy
